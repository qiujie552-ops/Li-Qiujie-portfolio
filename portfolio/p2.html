<style>

/* ═══════════════════════════════════════════
   DESIGN TOKENS  — 统一设计系统
═══════════════════════════════════════════ */
:root{
  /* Color */
  --bg:       #111110;
  --bg2:      #1c1c1a;
  --bg3:      #2a2a28;
  --ink:      #EFEFED;
  --ink2:     #C4C3BC;
  --ink3:     #7A7972;
  --line:     #2E2E2B;
  --white:    #FFFFFF;

  /* Spacing scale */
  --sp-xs:    6px;
  --sp-sm:    12px;
  --sp-md:    24px;
  --sp-lg:    48px;
  --sp-xl:    80px;
  --sp-2xl:   120px;

  /* Radius scale */
  --r-xs:     6px;
  --r-sm:     10px;
  --r-md:     16px;
  --r-lg:     24px;
  --r-xl:     32px;

  /* Typography */
  --f-display: -apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;
  --f-body:    -apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;
  --f-hand:   'Caveat',cursive;

  /* Motion */
  --ease:    cubic-bezier(.25,.8,.25,1);
  --spring:  cubic-bezier(.32,0,.67,0);
  --out:     cubic-bezier(.16,1,.3,1);

  /* Tag system — unified */
  --tag-h:    24px;
  --tag-px:   10px;
  --tag-r:    var(--r-xs);
  --tag-fs:   11px;
  --tag-color: var(--ink3);
  --tag-border: var(--line);
  --tag-bg:   var(--bg);
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f-body);
  background:var(--bg);color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{text-decoration:none;color:inherit}
button{border:none;background:none;font-family:inherit;cursor:pointer}

/* ═══════════════════════════════════════════
   NAV — with scroll-spy active state
═══════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp-lg);
  background:rgba(10,10,9,.98);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:box-shadow .3s;
}
nav.scrolled{box-shadow:0 1px 0 var(--line)}
.nav-logo{
  font-family:var(--f-hand);
  font-size:20px;font-weight:700;letter-spacing:.01em;
  color:var(--ink);
}
.nav-links{
  display:flex;align-items:center;gap:var(--sp-lg);
  list-style:none;
}
.nav-links a{
  font-size:13px;color:var(--ink3);
  letter-spacing:.02em;
  position:relative;padding-bottom:3px;
  transition:color .2s;
}
/* underline indicator */
.nav-links a::after{
  content:'';
  position:absolute;bottom:-1px;left:0;right:0;
  height:1.5px;background:var(--ink);
  transform:scaleX(0);transform-origin:center;
  transition:transform .28s var(--ease);
}
.nav-links a:hover{color:var(--ink)}
.nav-links a:hover::after{transform:scaleX(1)}
/* active state driven by JS scroll-spy */
.nav-links a.active{color:var(--ink)}
.nav-links a.active::after{transform:scaleX(1)}

/* ═══════════════════════════════════════════
   HERO  — no CTA buttons
═══════════════════════════════════════════ */
#hero{
  min-height:100vh;
  display:flex;align-items:center;
  padding:var(--sp-xl) var(--sp-lg) var(--sp-lg);
  position:relative;overflow:hidden;
}
.hero-inner{
  max-width:1100px;width:100%;margin:0 auto;
  display:grid;grid-template-columns:1fr;
  gap:var(--sp-xl);align-items:center;
}
.hero-label{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);margin-bottom:var(--sp-md);
  display:flex;align-items:center;gap:var(--sp-sm);
}
.hero-label::before{content:'';width:16px;height:1px;background:var(--ink3)}
.hero-name{
  font-family:var(--f-display);
  font-size:clamp(52px,7vw,92px);
  font-weight:700;line-height:1.0;letter-spacing:-.04em;
  margin-bottom:var(--sp-md);
}
.hero-name-sub{
  font-size:clamp(34px,4.5vw,58px);
  font-weight:400;color:var(--ink2);
}
.hero-bio{
  font-size:15px;line-height:1.85;color:var(--ink2);
  max-width:540px;font-weight:400;
}
.hero-bio strong{color:var(--ink);font-weight:500}

/* section badge — shared by work-exp and edu-line */
.sec-badge{
  position:absolute;top:-32px;right:0;
  display:inline-block;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:50px;
  padding:5px 14px;
  font-size:12px;font-weight:600;
  color:var(--ink);white-space:nowrap;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  transform:rotate(5deg) translateX(4px);
  transform-origin:top right;
  transition:transform .44s var(--out),box-shadow .44s var(--out);
  pointer-events:none;
}
.work-exp:hover .sec-badge,
.edu-line:hover .sec-badge,
.contact-info:hover .sec-badge{
  transform:rotate(0deg) translateX(0);
  box-shadow:0 6px 20px rgba(0,0,0,.14);
}

/* work experience accordion */
.work-exp{max-width:540px;margin-top:var(--sp-xl);position:relative}
.work-item{
  border-bottom:1px solid var(--line);
  padding:10px 0;cursor:default;
}
.work-item:first-child{border-top:1px solid var(--line)}
.work-summary{
  display:flex;align-items:center;gap:var(--sp-sm);
  font-size:14px;line-height:1.5;
}
.work-company{font-weight:600;color:var(--ink);flex-shrink:0}
.work-role{color:var(--ink2);font-weight:400;flex-shrink:0}
.work-period{color:var(--ink3);font-size:12px;margin-left:auto;flex-shrink:0;letter-spacing:.02em}
.work-detail{
  max-height:0;overflow:hidden;
  opacity:0;
  font-size:13px;color:var(--ink2);line-height:1.75;
  font-weight:400;
  transition:max-height .52s var(--out),opacity .38s var(--out),padding .38s;
  padding-top:0;
}
.work-item:hover .work-detail{
  max-height:400px;opacity:1;padding-top:10px;
}
.work-detail ul{
  list-style:none;padding:0;margin:0;
  display:flex;flex-direction:column;gap:4px;
}
.work-detail li{
  padding-left:14px;position:relative;
}
.work-detail li::before{
  content:'·';position:absolute;left:0;
  color:var(--ink3);font-weight:700;
}

/* education line */
.edu-line{
  display:flex;align-items:center;flex-wrap:wrap;
  gap:var(--sp-sm);margin-top:var(--sp-xl);
  font-size:13px;color:var(--ink2);font-weight:400;
  max-width:540px;position:relative;
}
.edu-sep{color:var(--line)}
.edu-item{display:flex;align-items:center;gap:5px}
.edu-degree{font-weight:500;color:var(--ink)}
.edu-school{color:var(--ink3)}

/* avatar */
.hero-right{position:relative}
.avatar-box{
  width:100%;aspect-ratio:3/4;
  background:var(--bg2);border-radius:var(--r-xl);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-sm);
  position:relative;overflow:hidden;
}
.avatar-icon{opacity:.2}
.avatar-hint{
  font-family:var(--f-hand);font-size:15px;
  color:var(--ink3);text-align:center;line-height:1.6;
}
.hero-float{
  position:absolute;bottom:-10px;right:-10px;
  background:var(--white);border-radius:var(--r-md);
  padding:8px 13px;border:1px solid var(--line);
  box-shadow:0 4px 16px rgba(0,0,0,.07);
  font-family:var(--f-hand);font-size:14px;color:var(--ink2);
  white-space:nowrap;
}

/* scroll hint */
.scroll-hint{
  display:flex;flex-direction:column;align-items:center;gap:var(--sp-xs);
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);
  animation:nudge 2.4s ease-in-out infinite;
}
.scroll-hint-between{
  text-align:center;
  padding:var(--sp-sm) 0;
}
@keyframes nudge{0%,100%{transform:translateY(0)}55%{transform:translateY(8px)}}

/* ═══════════════════════════════════════════
   SHARED SECTION ELEMENTS
═══════════════════════════════════════════ */
.sec-tag{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink3);font-weight:500;
  display:flex;align-items:center;gap:var(--sp-sm);
  margin-bottom:var(--sp-sm);
}
.sec-tag::before{content:'';width:16px;height:1px;background:var(--ink3)}
.sec-h2{
  font-family:var(--f-display);
  font-size:clamp(28px,3.8vw,46px);
  font-weight:600;line-height:1.1;letter-spacing:-.025em;
}

/* ═══════════════════════════════════════════
   WORKS
═══════════════════════════════════════════ */
#works{
  padding:var(--sp-2xl) var(--sp-lg);
  max-width:1200px;margin:0 auto;
}
.works-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:var(--sp-lg);
}
.works-count{font-size:13px;color:var(--ink3);letter-spacing:.04em}

/* grid */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:var(--sp-md);
}

/* ── CARD ── */
.card{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;
  position:relative;
  transition:
    transform   .38s var(--out),
    box-shadow  .38s var(--out);
}
.card:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:0 28px 60px rgba(0,0,0,.13);
}
.card-thumb{
  position:relative;overflow:hidden;
  aspect-ratio:16/10;background:var(--bg2);
}
.card-ph{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  filter:grayscale(1);
  transition:filter .5s var(--ease),transform .5s var(--ease);
}
.card:hover .card-ph{filter:grayscale(0);transform:scale(1.06)}
.card-ph-icon{width:40px;height:40px;opacity:.18}
.card-ph-label{
  font-family:var(--f-hand);font-size:13px;
  color:var(--ink3);text-align:center;line-height:1.5;
}

/* ── card image ── */
.card-img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  filter:grayscale(1);
  transition:filter .55s var(--ease),transform .55s var(--ease);
}
.card:hover .card-img{filter:grayscale(0);transform:scale(1.06)}

/* ── two-badge corner system ── */
.card-badges{
  position:absolute;bottom:14px;left:14px;
  display:flex;flex-direction:column;
  align-items:flex-start;gap:6px;
  pointer-events:none;
}

/* title pill — always slightly visible, tilted left */
.badge-title{
  display:inline-block;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:50px;
  padding:7px 16px;
  font-size:16px;font-weight:700;
  color:var(--ink);white-space:nowrap;
  box-shadow:0 2px 14px rgba(0,0,0,.10);
  transform:rotate(-5deg) translateX(-3px);
  transform-origin:bottom left;
  transition:
    transform .44s var(--out),
    box-shadow .44s var(--out),
    background .3s;
}
.card:hover .badge-title{
  transform:rotate(0deg) translateX(0);
  box-shadow:0 8px 28px rgba(0,0,0,.18);
  background:rgba(255,255,255,.97);
}

/* desc pill — always visible, slightly tilted right */
.badge-desc{
  display:inline-block;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:50px;
  padding:5px 14px;
  font-size:12px;font-weight:400;
  color:var(--ink2);white-space:nowrap;
  box-shadow:0 2px 10px rgba(0,0,0,.07);
  transform:rotate(4deg) translateX(4px);
  transform-origin:bottom left;
  transition:
    transform .46s var(--out),
    box-shadow .44s var(--out),
    background .3s;
}
.card:hover .badge-desc{
  transform:rotate(-2deg) translateX(0);
  box-shadow:0 6px 20px rgba(0,0,0,.13);
  background:rgba(255,255,255,.92);
}

/* cta badge — top right, hidden by default */
.badge-cta{
  position:absolute;top:14px;right:14px;
  display:inline-block;
  background:rgba(26,26,24,.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:50px;
  padding:6px 14px;
  font-size:11px;font-weight:400;letter-spacing:.04em;
  color:rgba(255,255,255,.88);white-space:nowrap;
  pointer-events:none;
  opacity:0;
  transform:rotate(-6deg) translateY(-6px) translateX(6px) scale(.8);
  transform-origin:top right;
  transition:
    transform .44s var(--out),
    opacity   .34s var(--out);
}
.card:hover .badge-cta{
  opacity:1;
  transform:rotate(2deg) translateY(0) translateX(0) scale(1);
  transition-delay:.05s;
}

/* ── UNIFIED TAG SYSTEM ── */
.tag{
  display:inline-flex;align-items:center;
  height:var(--tag-h);padding:0 var(--tag-px);
  border-radius:var(--tag-r);
  font-size:var(--tag-fs);
  color:var(--tag-color);
  border:1px solid var(--tag-border);
  background:var(--tag-bg);
  letter-spacing:.03em;
  transition:border-color .18s,color .18s;
}
.card:hover .tag{border-color:var(--ink3);color:var(--ink2)}
.card-tags{display:flex;flex-wrap:wrap;gap:var(--sp-xs)}

/* ── modal tag (same sizing, used inside sheet) ── */
.m-tag{
  display:inline-flex;align-items:center;
  height:var(--tag-h);padding:0 var(--tag-px);
  border-radius:var(--tag-r);
  font-size:var(--tag-fs);
  color:var(--tag-color);
  border:1px solid var(--tag-border);
  background:var(--bg);
  letter-spacing:.03em;
}

/* ═══════════════════════════════════════════
   CONTACT  — no buttons, no socials
═══════════════════════════════════════════ */
#contact{
  padding:var(--sp-md) var(--sp-lg) var(--sp-2xl);
  max-width:860px;margin:0 auto;text-align:center;
}
.contact-h2{
  font-family:var(--f-display);
  font-size:clamp(36px,5.5vw,72px);
  font-weight:600;line-height:1.06;letter-spacing:-.03em;
  margin-bottom:var(--sp-md);
}
.contact-sub{
  font-size:16px;color:var(--ink2);
  line-height:1.75;font-weight:400;
  margin-bottom:var(--sp-lg);
}
/* hero deco image — decorative, transparent overlay inside avatar box */
.hero-deco-img{
  position:absolute;
  width:85%;
  bottom:-12px;
  left:50%;
  transform:translateX(-50%);
  opacity:.18;
  pointer-events:none;
  mix-blend-mode:multiply;
  object-fit:contain;
}

/* contact deco image */
.contact-deco{
  display:flex;align-items:center;justify-content:center;
  margin:var(--sp-md) 0;
}
.contact-img{
  width:160px;
  opacity:.55;
  object-fit:contain;
  mix-blend-mode:multiply;
}

.contact-info{
  font-size:18px;color:var(--ink2);
  letter-spacing:.01em;
  display:inline-flex;flex-direction:column;gap:10px;
  position:relative;
}
.contact-row{
  display:flex;align-items:center;gap:10px;
}
.contact-row svg{flex-shrink:0;opacity:.75}

/* contact section title */
#contact .sec-tag{
  font-size:18px;color:var(--ink);font-weight:700;text-transform:none;
  letter-spacing:0;display:block;margin-bottom:var(--sp-lg);
}
#contact .sec-tag::before{display:none}

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
footer{
  border-top:1px solid var(--line);
  padding:var(--sp-md) var(--sp-lg);
  display:flex;align-items:center;justify-content:space-between;
}
.ft-copy{font-size:12px;color:var(--ink3)}
.ft-sig{font-family:var(--f-hand);font-size:16px;color:var(--ink3)}

/* ═══════════════════════════════════════════
   MODAL / BOTTOM SHEET
═══════════════════════════════════════════ */
.ov{
  position:fixed;inset:0;z-index:700;
  background:rgba(26,26,24,.5);
  backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.ov.on{opacity:1;pointer-events:all}

.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:701;
  height:86vh;
  background:var(--bg);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  transform:translateY(100%);
  transition:transform .48s var(--spring);
  display:flex;flex-direction:column;overflow:hidden;
}
.sheet.on{transform:translateY(0)}

.sheet-top{
  flex-shrink:0;position:relative;
  padding:var(--sp-sm) var(--sp-lg) 0;
  display:flex;align-items:center;justify-content:flex-end;
}
.sheet-handle{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;background:var(--line);border-radius:2px;
}
.sheet-close{
  width:30px;height:30px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .28s var(--ease);
}
.sheet-close:hover{background:var(--bg3);transform:rotate(90deg)}

.sheet-body{
  flex:1;overflow-y:auto;
  padding:var(--sp-lg) 6vw 80px;
}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}

/* 内容居中容器 */
.m-wrap{
  max-width:1100px;
  margin:0 auto;
}

/* ── modal typography ── */
.m-cat{
  font-size:11px;color:var(--ink3);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:var(--sp-xs);
}
.m-title{
  font-family:var(--f-display);
  font-size:clamp(26px,4vw,46px);font-weight:600;
  line-height:1.1;letter-spacing:-.025em;margin-bottom:var(--sp-sm);
}
.m-lead{
  font-size:15px;color:var(--ink2);line-height:1.85;
  max-width:100%;margin-bottom:var(--sp-lg);font-weight:400;
}
.m-rule{height:1px;background:var(--line);margin:72px 0}
.m-h3{
  font-size:19px;font-weight:600;letter-spacing:-.015em;
  margin-bottom:var(--sp-sm);
}
.m-p{
  font-size:14px;line-height:1.85;color:var(--ink2);
  max-width:100%;margin-bottom:var(--sp-md);font-weight:400;
}
.m-h4{
  font-size:15px;font-weight:600;letter-spacing:-.01em;
  margin:var(--sp-md) 0 var(--sp-xs);color:var(--ink1);
}
.m-p-meta{
  font-size:13px;color:var(--ink3);margin:var(--sp-xs) 0 4px;
  font-weight:500;letter-spacing:.01em;
}
.m-ul{
  list-style:none;padding:0;margin:0 0 var(--sp-sm);
}
.m-ul li{
  font-size:14px;line-height:1.75;color:var(--ink2);
  padding-left:16px;position:relative;font-weight:400;
}
.m-ul li::before{
  content:'·';position:absolute;left:4px;color:var(--ink3);font-weight:700;
}
/* 三栏用户/情景/竞品 */
.usc-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:16px;margin:var(--sp-sm) 0 var(--sp-lg);
  align-items:stretch;
}
.usc-col{
  background:#fff;border-radius:16px;
  padding:16px;display:flex;flex-direction:column;gap:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.usc-col-title{
  font-size:15px;font-weight:700;color:#000;
  letter-spacing:-.01em;padding-bottom:8px;
  border-bottom:1.5px solid rgba(26,26,24,.1);
  flex-shrink:0;margin-bottom:12px;
}
/* 记事板图片区 — 自包含，不溢出 */
.pin-board{
  display:flex;gap:8px;width:100%;
  justify-content:center;align-items:flex-start;
  margin-bottom:10px;
}
.pin-img{
  display:block;height:auto;
  border-radius:6px;
  box-shadow:0 3px 10px rgba(0,0,0,.18);
  border:3px solid #fff;
  transition:transform .22s ease;
  flex:1;min-width:0;max-width:100%;
  object-fit:contain;
}
.pin-img:hover{transform:rotate(0deg) scale(1.05)!important;}
/* 竞品截图区 — 两张并排，logo贴左上角 */
.comp-shots{
  display:flex;gap:8px;margin-bottom:6px;flex-shrink:0;
}
.comp-shot-wrap{
  position:relative;flex:1;border-radius:8px;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  border:3px solid #fff;
  transform-origin:center bottom;
  background:rgba(255,255,255,0.6);
  width:fit-content;
  display: flex;
  justify-content: center;
}
.comp-shot-wrap:first-child{transform:rotate(-2.5deg);}
.comp-shot-wrap:last-child{transform:rotate(2deg);}
.comp-shot-wrap img.shot{
  width:100%;height:auto;display:block;
}
.comp-shot-wrap img.logo-badge{
  position:absolute;top:6px;left:6px;
  width:28px;height:28px;
  border-radius:7px;
  background:rgba(255,255,255,.92);
  padding:3px;object-fit:contain;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
/* 竞品文字区 */
.comp-block{ margin-bottom:24px; }
.comp-name{
  font-size:15px;font-weight:700;color:#000;margin:0 0 8px;
}
.comp-label{
  display:inline-flex;align-items:center;
  font-size:9.5px;font-weight:600;
  padding:2px 8px;border-radius:20px;
  background:rgba(0,0,0,0.08);
  color:rgba(0,0,0,0.45);
  margin:6px 0 3px;
}
.comp-pro,.comp-con{color:var(--ink3);}
/* 编号列表 — 实心小圆 */
.m-ol{
  list-style:none;padding:0;margin:0 0 4px;
}
.m-ol li{
  font-size:12.5px;line-height:1.65;color:var(--ink2);
  padding-left:14px;position:relative;font-weight:400;
}
.m-ol li::before{
  content:'—';
  position:absolute;left:0;top:0;
  font-size:10px;line-height:1.9;
  color:var(--ink3);
}
.m-p-meta{
  font-size:13px;color:var(--ink1);margin:10px 0 3px;
  font-weight:700;letter-spacing:-.01em;
}

/* ═══════════════════════════════════════════
   SCATTER  — improved stagger reveal
═══════════════════════════════════════════ */
.scatter{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:var(--sp-sm);margin:var(--sp-md) 0;
}
.scard{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:var(--r-md);
  overflow:hidden;
  opacity:0;
  transform:scale(.82) rotate(var(--rot)) translateY(20px);
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  transition:
    opacity   .52s var(--out),
    transform .52s var(--out),
    box-shadow .22s;
}
.scard.out{
  opacity:1;
  transform:scale(1) rotate(var(--rot)) translateY(0);
}
.scard:hover{
  transform:scale(1.05) rotate(0deg) translateY(-4px) !important;
  box-shadow:0 14px 32px rgba(0,0,0,.12);
  z-index:2;position:relative;
}
.scard-inner{
  aspect-ratio:4/3;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:var(--sp-sm);background:var(--bg2);
}
.scard-ico{opacity:.25;flex-shrink:0}
.scard-lbl{
  font-family:var(--f-hand);font-size:13px;
  color:var(--ink3);text-align:center;line-height:1.5;
}

/* ═══════════════════════════════════════════
   HSCROLL  — auto-scrolling
═══════════════════════════════════════════ */
.hscroll-wrap{
  overflow:hidden;margin:var(--sp-md) 0;
  position:relative;
}
.hscroll-wrap::before,.hscroll-wrap::after{
  content:'';position:absolute;top:0;bottom:0;z-index:2;
  width:40px;pointer-events:none;
}
.hscroll-wrap::before{left:0;background:linear-gradient(to right,var(--bg),transparent)}
.hscroll-wrap::after{right:0;background:linear-gradient(to left,var(--bg),transparent)}
.hscroll{
  display:flex;gap:var(--sp-sm);
  /* auto scroll via animation */
  animation:autoScroll 22s linear infinite;
  width:max-content;
}

@keyframes autoScroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
.hitem{
  flex-shrink:0;
  height:280px;width:auto;
  background:transparent;border:none;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;
  position:relative;overflow:visible;cursor:pointer;
}
.hitem:hover img{transform:scale(1.05);}
.hitem.clicked img{transform:scale(1.12);}
.hitem img{height:280px;width:auto;display:block;border-radius:10px;
  transition:transform .35s cubic-bezier(.25,.8,.25,1);
  box-shadow:0 4px 16px rgba(0,0,0,.28);}
.hitem-ico{display:none;}
.hitem-lbl{display:none;}
.hitem-badge{
  position:absolute;top:10px;left:10px;
  background:#fff;color:#1A1A18;
  font-size:11px;font-weight:600;line-height:1.2;
  padding:4px 10px;border-radius:40px;
  z-index:3;
  letter-spacing:.01em;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
  transform-origin:left center;
  transition:transform .22s cubic-bezier(.25,.8,.25,1);
}
.hitem:hover .hitem-badge{
  transform:scale(1.12) rotate(-6deg);
}

/* ═══════════════════════════════════════════
   CHART — bar + placeholder ring for pie
═══════════════════════════════════════════ */
.charts-row{
  display:grid;grid-template-columns:1fr 1fr;
  gap:var(--sp-md);margin:var(--sp-md) 0;
}
.chart-block{
  background:var(--white);border:1px solid var(--line);
  border-radius:var(--r-md);padding:var(--sp-md);
}
.chart-title{font-size:12px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:var(--sp-md)}

/* bar chart */
.crow{display:flex;align-items:center;gap:var(--sp-sm);margin-bottom:var(--sp-sm)}
.clbl{font-size:12px;color:var(--ink2);width:120px;flex-shrink:0;font-weight:400;line-height:1.4}
.ctrack{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.cfill{height:100%;background:var(--ink);border-radius:3px;width:0;transition:width 1.2s var(--out)}
.cpct{font-size:11px;color:var(--ink3);width:30px;text-align:right}

/* pie placeholder */
.pie-ph{
  display:flex;align-items:center;justify-content:center;
  height:140px;
}
.pie-ph svg{opacity:.2}
.pie-ph-label{
  font-family:var(--f-hand);font-size:14px;color:var(--ink3);
  text-align:center;margin-top:var(--sp-sm);
}

/* ═══════════════════════════════════════════
   PHONE MOCKUP  (芽芽圈 screens)
═══════════════════════════════════════════ */
.phones{
  display:flex;gap:var(--sp-md);margin:var(--sp-md) 0;
  overflow-x:auto;scrollbar-width:none;padding-bottom:var(--sp-sm);
}
.phones::-webkit-scrollbar{display:none}
.phone{
  flex-shrink:0;
  width:180px;
  background:var(--ink);
  border-radius:28px;
  padding:10px 8px;
  box-shadow:0 16px 40px rgba(0,0,0,.22);
  transition:transform .3s var(--out),box-shadow .3s;
}
.phone:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 26px 56px rgba(0,0,0,.3)}
.phone-notch{
  width:52px;height:10px;background:var(--ink2);
  border-radius:6px;margin:0 auto var(--sp-sm);
  opacity:.5;
}
.phone-screen{
  background:var(--white);border-radius:18px;
  padding:var(--sp-sm);min-height:300px;
  display:flex;flex-direction:column;gap:var(--sp-xs);
}
.phone-bar{height:5px;background:var(--bg3);border-radius:3px}
.phone-bar.short{width:55%}
.phone-block{height:60px;background:var(--bg2);border-radius:8px;margin:var(--sp-xs) 0;display:flex;align-items:center;justify-content:center}
.phone-block-lbl{font-size:10px;color:var(--ink3);text-align:center;line-height:1.4;padding:4px}
.phone-row{display:flex;gap:4px}
.phone-mini{flex:1;height:38px;background:var(--bg2);border-radius:6px}

/* ═══════════════════════════════════════════
   HIGHLIGHT
═══════════════════════════════════════════ */
.hl{position:relative;display:inline}
.hl::before{
  content:'';position:absolute;bottom:0;left:0;
  height:38%;background:rgba(0,0,0,.1);z-index:-1;
  width:0;transition:width .8s var(--out);
}
.hl.on::before{width:100%}

/* ═══════════════════════════════════════════
   MOCKUPS (desktop browser frames)
═══════════════════════════════════════════ */
.mocks{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-sm);margin:var(--sp-md) 0}
.mock{
  background:var(--white);border:1px solid var(--line);
  border-radius:var(--r-md);overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:transform .28s var(--out),box-shadow .28s;
}
.mock:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.1)}
.mock-bar{
  height:26px;background:var(--bg2);border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 var(--sp-sm);gap:4px;
}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--bg3)}
.mock-body{padding:var(--sp-sm);min-height:96px}
.mline{height:5px;background:var(--bg2);border-radius:2px;margin-bottom:6px}

/* ═══════════════════════════════════════════
   BRAND SWATCHES
═══════════════════════════════════════════ */
.swatches{display:flex;gap:var(--sp-sm);margin:var(--sp-md) 0;flex-wrap:wrap}
.swatch{display:flex;flex-direction:column;align-items:center;gap:4px}
.swatch-c{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);transition:transform .2s}
.swatch-c:hover{transform:scale(1.15)}
.swatch-n{font-size:10px;color:var(--ink3)}

/* ═══════════════════════════════════════════
   VIDEO PLACEHOLDER
═══════════════════════════════════════════ */
.vidph{
  background:#1a1a18;border-radius:12px;
  aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;
  margin:var(--sp-md) auto;position:relative;overflow:hidden;
  max-width:640px;cursor:pointer;
}
.vidph img.vid-thumb{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  border-radius:12px;transition:transform .4s ease;
}
.vidph:hover img.vid-thumb{transform:scale(1.03);}
.vid-play{
  position:relative;z-index:2;
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);
  backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  transition:background .22s,transform .3s var(--out),box-shadow .3s;
}
.vidph:hover .vid-play{
  background:rgba(255,255,255,.30);
  transform:scale(1.18);
  box-shadow:0 0 28px rgba(255,255,255,.25);
}
.vid-lbl{
  position:absolute;bottom:16px;left:var(--sp-md);
  font-family:var(--f-hand);font-size:14px;color:rgba(255,255,255,.32);
}

/* ═══════════════════════════════════════════
   MINDMAP — always visible, nodes grow on hover
═══════════════════════════════════════════ */
.mmap{
  position:relative;height:260px;
  background:var(--white);border:1px solid var(--line);
  border-radius:var(--r-lg);overflow:visible;margin:var(--sp-md) 0;
}
.mmap-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:var(--ink);color:var(--white);
  border-radius:50px;padding:8px 18px;
  font-size:13px;font-weight:500;white-space:nowrap;
  z-index:2;
  transition:transform .22s var(--out);
  user-select:none;
}
/* SVG connector lines */
.mmap-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;overflow:visible;
}
.mmap-line{
  stroke:var(--line);stroke-width:1;fill:none;
  stroke-dasharray:120;stroke-dashoffset:120;
  transition:stroke-dashoffset .5s var(--out);
}
.mmap:hover .mmap-line{stroke-dashoffset:0}
.mmap-node{
  position:absolute;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:50px;padding:5px 12px;
  font-size:12px;color:var(--ink2);white-space:nowrap;
  /* always visible but small by default */
  opacity:.45;
  transform:translate(var(--tx),var(--ty)) scale(.72);
  transform-origin:center;
  transition:
    opacity .38s var(--out),
    transform .42s var(--out),
    box-shadow .22s;
}
/* on mmap hover: all nodes grow to full size */
.mmap:hover .mmap-node{
  opacity:1;
  transform:translate(var(--tx),var(--ty)) scale(1);
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}
/* stagger each node's delay */
.mmap:hover .mmap-node:nth-child(1){transition-delay:.04s}
.mmap:hover .mmap-node:nth-child(2){transition-delay:.09s}
.mmap:hover .mmap-node:nth-child(3){transition-delay:.14s}
.mmap:hover .mmap-node:nth-child(4){transition-delay:.19s}
.mmap:hover .mmap-node:nth-child(5){transition-delay:.24s}
.mmap:hover .mmap-node:nth-child(6){transition-delay:.29s}

<h2 class="m-title">止于圆</h2>
<p class="m-lead">该作品旨在探讨中国社会中普遍存在的"……以后就好了"这一心态。作品将人们对美好未来的无限憧憬，与现实中循环往复的困境形成尖锐矛盾，引发观者对"延迟满足"的深刻反思。</p>
<p class="m-p" style="margin-top:1.2em">装置的核心理念是：我们穷尽一生去追寻一个遥远的"彼岸"，将当下的挣扎视为通往幸福的必经之路。然而，人生的旅程并非是一条线性的航线，而是一次无止境的漂泊。我们所期待的"上岸"，或许只是一个永恒的循环，最终又回到起点。那我们又该如何在"没有终点的当下"好好活着？</p>

${rule()}
<h3 class="m-h3">调研与思考</h3>
<div class="sticky-notes rv">
  <div class="sticky">
    <p class="sticky-title">无尽的循环 · 在荒诞中漂泊</p>
    <p class="sticky-body">我的生活，乃至我母亲、朋友、老师的生活，都像一场永不停止的循环。我们像钟摆在"痛苦"与"无聊"间往复，像猴子一遍遍地捞取水中倒影，疲惫不堪却又不得不继续，只因心中还存着对"以后会好"的微光。这是一种混杂着期待与空虚的复杂状态，一种在希望中被反复重置的心理困境。正如等待戈多所提醒的：也许明天就会好起来了。但是消极的等待没有任何结果。</p>
  </div>
  <div class="sticky">
    <p class="sticky-title">自我规训的凝视</p>
    <p class="sticky-body">福柯的理论告诉我们，最大的权力并非来自强制，而是来自内化的"凝视"。我们正是被这种无形的视线所塑造。我们以社会所定义的未来的成功为模板，不断审视、规训当下的自己。"凝视者消失，但每个人都在被凝视中自我规训"，那个看不见的凝视者其实就是我们自己，它让我们相信，只有牺牲当下的幸福，才能换取未来的成功。</p>
  </div>
  <div class="sticky">
    <p class="sticky-title">叙事的力量</p>
    <p class="sticky-body">如何面对漂流？导演李安在《少年派的奇幻漂流》中曾提出一个深刻的问题：面对残忍的现实，我们是否能选择一个更美好的故事去相信？也许我们无法停止漂流，但我们可以选择如何讲述自己的漂流。就像那场印度空难中，威亚斯一家在多年的等待后，终于迎来团聚和新生活，却在飞机坠毁时全部离世。当终点永远缺席，我们该如何生活？李安的回答是：我们需要叙事，不然我们的生活就会像π一样继续下去，因为等待彼岸可能只是一个故事，而叙事本身，才是我们面对无止境漂流的意义。</p>
  </div>
</div>

const PKEY='p2';

window.addEventListener('DOMContentLoaded', () => {
  window.addEventListener('scroll', () => {
    document.querySelector('.proj-nav')?.classList.toggle('scrolled', scrollY > 20);
  }, {passive:true});

  const wrap = document.getElementById('pc');
  if(wrap) {
    wrap.innerHTML = P[PKEY];
    requestAnimationFrame(() => setTimeout(() => {
      document.querySelectorAll('.scard').forEach((el,i) =>
        setTimeout(() => el.classList.add('out'), i*95));
      document.querySelectorAll('.cfill').forEach(el => { el.style.width = el.dataset.w; });
      document.querySelectorAll('.hl').forEach((el,i) =>
        setTimeout(() => el.classList.add('on'), 400 + i*170));
      document.querySelectorAll('.hscroll').forEach(hs => {
        [...hs.children].forEach(k => hs.appendChild(k.cloneNode(true)));
      });
      // hscroll click-pause interaction
      document.querySelectorAll('.hscroll-wrap').forEach(wrap => {
        const hs = wrap.querySelector('.hscroll');
        wrap.addEventListener('mouseleave', () => {
          wrap.querySelectorAll('.hitem.clicked').forEach(el => el.classList.remove('clicked'));
          if(hs) hs.style.animationPlayState = 'running';
        });
        wrap.addEventListener('click', e => {
          const item = e.target.closest('.hitem');
          if(!item) return;
          const wasClicked = item.classList.contains('clicked');
          wrap.querySelectorAll('.hitem.clicked').forEach(el => el.classList.remove('clicked'));
          if(!wasClicked){
            item.classList.add('clicked');
            if(hs) hs.style.animationPlayState = 'paused';
          } else {
            if(hs) hs.style.animationPlayState = 'running';
          }
        });
      });
      document.querySelectorAll('#pc .rv').forEach((el,i) =>
        setTimeout(() => el.classList.add('v'), 60 + i*60));
    }, 100));
  }

  const rvObs = new IntersectionObserver(e => {
    e.forEach(x => {
      if(x.isIntersecting){
        x.target.classList.add('v');
        rvObs.unobserve(x.target);
      }
    });
  }, {threshold:.15});
  document.querySelectorAll('.rv').forEach(el => rvObs.observe(el));
});

</script>
