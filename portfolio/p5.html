<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水滴 · AI产品运营</title>
<style>
:root{
  --bg:#111214;
  --bg2:#1A1A18;
  --bg3:#252833;
  --ink:#F6F4EC;
  --ink2:rgba(246,244,236,.76);
  --ink3:rgba(246,244,236,.48);
  --line:rgba(255,255,255,.12);
  --white:#FFFFFF;
  --accent:#BEC7DB;
  --sp-xs:6px;--sp-sm:12px;--sp-md:24px;--sp-lg:48px;--sp-xl:80px;
  --r-sm:10px;--r-md:16px;--r-lg:24px;
  --f-display:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;
  --f-body:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC',sans-serif;
  --out:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f-body);
  background:
    radial-gradient(circle at 18% 8%, rgba(190,199,219,.14), transparent 32%),
    radial-gradient(circle at 82% 42%, rgba(255,255,255,.06), transparent 28%),
    var(--bg);
  color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
.proj-nav{
  position:fixed;top:0;left:0;right:0;z-index:900;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp-lg);
  background:rgba(17,18,20,.82);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:box-shadow .3s;
}
.proj-nav.scrolled{box-shadow:0 1px 0 var(--line)}
.proj-logo{font-size:18px;font-weight:700;letter-spacing:.01em;color:var(--ink)}
.proj-page{max-width:1100px;margin:0 auto;padding:80px 3vw 96px}
.m-wrap{max-width:1100px;margin:0 auto}
.m-cat{font-size:11px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:var(--sp-xs)}
.m-title{font-family:var(--f-display);font-size:clamp(28px,4vw,48px);font-weight:650;line-height:1.08;letter-spacing:-.03em;margin-bottom:var(--sp-sm)}
.m-lead{font-size:15px;color:var(--ink2);line-height:1.85;max-width:760px;margin-bottom:var(--sp-lg)}
.m-rule{height:1px;background:var(--line);margin:72px 0}
.m-h3{font-size:19px;font-weight:650;letter-spacing:-.015em;margin-bottom:var(--sp-sm)}
.m-p{font-size:14px;line-height:1.85;color:var(--ink2);max-width:760px;margin-bottom:var(--sp-md)}
.placeholder-hero{
  margin:34px 0 0;
  min-height:280px;
  border:1px dashed rgba(255,255,255,.2);
  border-radius:var(--r-lg);
  background:
    linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.02)),
    radial-gradient(circle at 28% 32%, rgba(190,199,219,.18), transparent 28%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink3);
  letter-spacing:.08em;
  font-size:12px;
}
.placeholder-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--sp-sm);
  margin-top:var(--sp-md);
}
.placeholder-card{
  min-height:150px;
  border:1px solid var(--line);
  border-radius:var(--r-md);
  background:rgba(255,255,255,.045);
  padding:22px;
  transition:transform .28s var(--out),border-color .28s,background .28s;
}
.placeholder-card:hover{
  transform:translateY(-5px);
  border-color:rgba(190,199,219,.46);
  background:rgba(255,255,255,.07);
}
.placeholder-label{
  display:inline-flex;
  padding:5px 12px;
  border-radius:999px;
  background:rgba(255,255,255,.88);
  color:#1A1A18;
  font-size:12px;
  font-weight:650;
  margin-bottom:16px;
}
.placeholder-line{
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,.13);
  margin-bottom:10px;
}
.placeholder-line.short{width:58%}
.placeholder-line.mid{width:76%}
.placeholder-media{
  min-height:240px;
  border:1px dashed rgba(255,255,255,.18);
  border-radius:var(--r-lg);
  background:rgba(255,255,255,.035);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink3);
  font-size:12px;
  letter-spacing:.08em;
}
.rv{opacity:0;transform:translateY(24px);transition:opacity .65s var(--out),transform .65s var(--out)}
.rv.v{opacity:1;transform:translateY(0)}
@media(max-width:820px){
  .proj-nav{padding:0 var(--sp-md)}
  .proj-page{padding:72px var(--sp-md) 72px}
  .placeholder-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav class="proj-nav">
  <span class="proj-logo">Portfolio</span>
</nav>
<div class="proj-page">
  <div class="m-wrap" id="pc"></div>
</div>
<script>
const rule=()=>`<div class="m-rule"></div>`;

const P={
p5:`
<p class="m-cat">实习经历 · AI产品运营 · 项目占位</p>
<h2 class="m-title">水滴 · AI产品运营</h2>
<p class="m-lead">这里预留项目概述位置，后续可补充具体背景、职责、产出与项目成果。</p>
<div class="placeholder-hero rv">封面 / 核心视觉占位</div>

${rule()}
<h3 class="m-h3">项目概览</h3>
<div class="placeholder-grid rv">
  <div class="placeholder-card">
    <span class="placeholder-label">模块占位</span>
    <div class="placeholder-line"></div>
    <div class="placeholder-line mid"></div>
    <div class="placeholder-line short"></div>
  </div>
  <div class="placeholder-card">
    <span class="placeholder-label">模块占位</span>
    <div class="placeholder-line"></div>
    <div class="placeholder-line mid"></div>
    <div class="placeholder-line short"></div>
  </div>
  <div class="placeholder-card">
    <span class="placeholder-label">模块占位</span>
    <div class="placeholder-line"></div>
    <div class="placeholder-line mid"></div>
    <div class="placeholder-line short"></div>
  </div>
</div>

${rule()}
<h3 class="m-h3">内容展示</h3>
<p class="m-p">这里预留详细内容、流程图、分析结论或项目图片的位置。</p>
<div class="placeholder-media rv">图片 / 视频 / 数据展示占位</div>
`,
};
const PKEY='p5';

window.addEventListener('DOMContentLoaded', () => {
  window.addEventListener('scroll', () => {
    document.querySelector('.proj-nav')?.classList.toggle('scrolled', scrollY > 20);
  }, {passive:true});

  const wrap = document.getElementById('pc');
  if(wrap){
    wrap.innerHTML = P[PKEY];
    requestAnimationFrame(() => setTimeout(() => {
      document.querySelectorAll('#pc .rv').forEach((el,i) =>
        setTimeout(() => el.classList.add('v'), 60 + i*80));
    }, 80));
  }
});
</script>
</body>
</html>
